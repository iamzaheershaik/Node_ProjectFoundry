<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz APP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="app-container">
        <!-- Start Screen -->
        <section id="start-screen" class="screen active">
            <div class="logo">🧠</div>
            <h1 class="app-title">QuizMaster</h1>
            <p class="app-subtitle">Test your knowledge with fun trivia question</p>

            <div class="info-cards">
                <div class="info-card">📝 10 Questions</div>
                <div class="info-card">⏰ 15s per question
                </div>
                <div class="info-card">🏆 Instant Results</div>
            </div>
            <div class="input-group">
                <label for="player-name">Enter Your Name</label>
                <input type="text" id="player-name" placeholder="e.g. John Doe" maxlength="20">
            </div>
            <button id="start-btn" class="start-btn">Start-Quiz</button>
            <!--start screen end-->
        </section>
        <section id="quiz-screen" class="screen">
            <div class="quiz-header">
                <span id="question-counter">Question 1/10</span>
                <span id="score-display">Score: 0</span>
            </div>
            <div class="progress-bar-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div class="timer-container">
                <span id="timer-text">15</span>
            </div>
            <div class="question-area">
                <span id="question-category" class="question-category">Category</span>
                <h2 id="question-text">What is </h2>
            </div>
            <div id="options-container" class="options-container">
                
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>

</html>
