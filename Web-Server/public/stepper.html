<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Execution Flow Stepper — Web Server Architecture</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg-deep:#0a0a0f;--bg-panel:#11111b;--bg-editor:#16161e;--bg-line:#1a1a2e;
--bg-active:#2a2a4a;--bg-hover:rgba(139,92,246,.08);
--border:#1e1e32;--border-active:#7c3aed;
--text:#c9d1d9;--text-dim:#565f89;--text-bright:#e2e8f0;
--accent:#7c3aed;--accent-glow:rgba(124,58,237,.3);
--green:#4ade80;--blue:#60a5fa;--orange:#fb923c;--pink:#f472b6;--cyan:#22d3ee;--yellow:#facc15;--red:#f87171;
--step-pulse:rgba(124,58,237,.15);
}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg-deep);color:var(--text);overflow:hidden}

/* LAYOUT */
.app{display:grid;grid-template-rows:auto 1fr auto;height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:var(--bg-panel);border-bottom:1px solid var(--border);gap:16px}
.header h1{font-size:15px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.header .phase-badge{font-size:11px;padding:4px 12px;border-radius:20px;background:var(--accent-glow);color:var(--accent);border:1px solid var(--accent);font-weight:600;white-space:nowrap}
.main{display:grid;grid-template-columns:220px 1fr 260px;overflow:hidden}
.footer{display:flex;align-items:center;justify-content:space-between;padding:8px 24px;background:var(--bg-panel);border-top:1px solid var(--border);gap:12px}

/* SIDEBAR */
.sidebar{background:var(--bg-panel);border-right:1px solid var(--border);overflow-y:auto;padding:12px 0}
.sidebar h3{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);padding:8px 16px 6px;font-weight:600}
.file-item{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text-dim);transition:.15s;border-left:2px solid transparent}
.file-item:hover{background:var(--bg-hover);color:var(--text)}
.file-item.active{color:var(--accent);border-left-color:var(--accent);background:var(--bg-hover)}
.file-item .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.file-item.done .dot{background:var(--green)}
.file-item.active .dot{background:var(--accent);box-shadow:0 0 6px var(--accent)}
.file-item.pending .dot{background:var(--text-dim)}

/* EDITOR */
.editor-wrap{display:flex;flex-direction:column;overflow:hidden}
.tab-bar{display:flex;gap:0;background:var(--bg-panel);border-bottom:1px solid var(--border);overflow-x:auto;min-height:36px}
.tab{padding:8px 18px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:.15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--bg-editor)}
.editor{flex:1;overflow-y:auto;background:var(--bg-editor);font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.7;padding:0}
.code-line{display:flex;padding:0 16px 0 0;min-height:22px;transition:background .2s}
.code-line .ln{width:48px;text-align:right;padding-right:16px;color:var(--text-dim);user-select:none;flex-shrink:0;font-size:12px}
.code-line .code{white-space:pre;flex:1;padding-right:16px}
.code-line.highlighted{background:var(--step-pulse);border-left:3px solid var(--accent);animation:pulse 1.5s ease-in-out infinite}
.code-line.executed{background:rgba(74,222,128,.04);border-left:3px solid rgba(74,222,128,.3)}
.code-line.next{background:rgba(251,146,60,.06);border-left:3px solid rgba(251,146,60,.3)}
@keyframes pulse{0%,100%{background:var(--step-pulse)}50%{background:rgba(124,58,237,.25)}}

/* RIGHT PANEL */
.right-panel{background:var(--bg-panel);border-left:1px solid var(--border);overflow-y:auto;font-size:12px}
.panel-section{border-bottom:1px solid var(--border);padding:12px 14px}
.panel-section h4{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:8px;font-weight:600}
.call-stack-item{padding:5px 8px;border-radius:4px;margin-bottom:3px;background:var(--bg-editor);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;border-left:2px solid var(--accent)}
.var-row{display:flex;justify-content:space-between;padding:4px 8px;border-radius:4px;margin-bottom:2px;background:var(--bg-editor)}
.var-row .vname{color:var(--cyan);font-family:'JetBrains Mono',monospace;font-size:11px}
.var-row .vval{color:var(--orange);font-family:'JetBrains Mono',monospace;font-size:11px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.explanation{padding:12px 14px;font-size:12px;line-height:1.6;color:var(--text);border-bottom:1px solid var(--border)}
.explanation .emoji{font-size:14px;margin-right:4px}

/* CONTROLS */
.controls{display:flex;align-items:center;gap:6px}
.ctrl-btn{padding:6px 14px;border:1px solid var(--border);background:var(--bg-editor);color:var(--text);border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;transition:.15s;font-family:'Inter',sans-serif}
.ctrl-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--bg-hover)}
.ctrl-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.ctrl-btn.primary:hover{background:#6d28d9}
.ctrl-btn:disabled{opacity:.3;cursor:not-allowed;border-color:var(--border)!important;color:var(--text-dim)!important;background:var(--bg-editor)!important}
.progress{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-dim)}
.progress-bar{width:200px;height:4px;background:var(--bg-editor);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--pink));border-radius:4px;transition:width .3s ease}
.step-counter{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-dim)}
.kbd{font-size:10px;padding:2px 6px;border:1px solid var(--border);border-radius:3px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;margin-left:4px}

/* SYNTAX COLORS */
.kw{color:#bb9af7}.str{color:#9ece6a}.fn{color:#7aa2f7}.cm{color:#565f89;font-style:italic}
.num{color:#ff9e64}.op{color:#89ddff}.pr{color:#f7768e}.obj{color:#e0af68}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#333}

/* SPEED SELECTOR */
.speed-select{background:var(--bg-editor);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-size:11px;font-family:'Inter',sans-serif;cursor:pointer}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <h1>⚡ Execution Flow Stepper</h1>
    <span class="phase-badge" id="phaseBadge">Chapter 2: TCP Server</span>
    <div class="controls">
      <button class="ctrl-btn" id="btnReset" title="Reset">⟲ Reset</button>
      <button class="ctrl-btn" id="btnPrev" title="Previous Step">◀ Prev <span class="kbd">←</span></button>
      <button class="ctrl-btn primary" id="btnNext" title="Next Step">Next ▶ <span class="kbd">→</span></button>
      <button class="ctrl-btn" id="btnPlay" title="Auto-play">▶ Play <span class="kbd">Space</span></button>
      <select class="speed-select" id="speedSelect"><option value="2000">Slow</option><option value="1000" selected>Normal</option><option value="500">Fast</option></select>
    </div>
  </header>
  <div class="main">
    <aside class="sidebar">
      <h3>📁 Files</h3>
      <div id="fileList"></div>
      <h3 style="margin-top:16px">📍 Chapters</h3>
      <div id="chapterList"></div>
    </aside>
    <section class="editor-wrap">
      <div class="tab-bar" id="tabBar"></div>
      <div class="editor" id="editor"></div>
    </section>
    <aside class="right-panel">
      <div class="explanation" id="explanation"><span class="emoji">👋</span> Press <b>Next</b> or <b>→</b> to start tracing execution.</div>
      <div class="panel-section"><h4>📚 Call Stack</h4><div id="callStack"><span style="color:var(--text-dim);font-size:11px">Empty</span></div></div>
      <div class="panel-section"><h4>📦 Variables / State</h4><div id="variables"><span style="color:var(--text-dim);font-size:11px">No variables yet</span></div></div>
      <div class="panel-section"><h4>🔌 Events</h4><div id="events"><span style="color:var(--text-dim);font-size:11px">No events fired</span></div></div>
    </aside>
  </div>
  <footer class="footer">
    <div class="progress"><div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div><span class="step-counter" id="stepCounter">0 / 0</span></div>
    <div style="font-size:11px;color:var(--text-dim)">Node.js Web Server — From TCP to HTTP | ← → Space to navigate</div>
  </footer>
</div>

// ═══════════════════════════════════════════════════════
// APP STATE & RENDERING
// ═══════════════════════════════════════════════════════
let currentStep = -1;
let playing = false;
let playTimer = null;
let executedLines = {}; // {file: Set(lineIdx)}
const fileKeys = Object.keys(FILES);

function initUI() {
  // File list
  const fl = document.getElementById('fileList');
  fl.innerHTML = fileKeys.map(f => `<div class="file-item pending" data-file="${f}"><span class="dot"></span>${f.split('/').pop()}</div>`).join('');
  fl.querySelectorAll('.file-item').forEach(el => el.addEventListener('click', () => showFile(el.dataset.file)));

  // Chapter list
  const chapters = [...new Set(STEPS.filter(s=>s.phase).map(s=>s.phase))];
  const cl = document.getElementById('chapterList');
  cl.innerHTML = chapters.map((c,i) => {
    const stepIdx = STEPS.findIndex(s=>s.phase===c);
    return `<div class="file-item pending" data-step="${stepIdx}"><span class="dot"></span>${c}</div>`;
  }).join('');
  cl.querySelectorAll('.file-item').forEach(el => el.addEventListener('click', () => goToStep(parseInt(el.dataset.step))));

  document.getElementById('btnNext').addEventListener('click', nextStep);
  document.getElementById('btnPrev').addEventListener('click', prevStep);
  document.getElementById('btnReset').addEventListener('click', reset);
  document.getElementById('btnPlay').addEventListener('click', togglePlay);
  document.addEventListener('keydown', e => {
    if(e.key==='ArrowRight') nextStep();
    else if(e.key==='ArrowLeft') prevStep();
    else if(e.key===' ') { e.preventDefault(); togglePlay(); }
  });
  document.getElementById('stepCounter').textContent = `0 / ${STEPS.length}`;
  showFile(fileKeys[0]);
}

function showFile(fileKey) {
  const file = FILES[fileKey];
  if(!file) return;

  // Tabs
  const tb = document.getElementById('tabBar');
  tb.innerHTML = fileKeys.map(f => `<div class="tab ${f===fileKey?'active':''}" data-file="${f}">${f.split('/').pop()}</div>`).join('');
  tb.querySelectorAll('.tab').forEach(el => el.addEventListener('click', () => showFile(el.dataset.file)));

  // Editor lines
  const ed = document.getElementById('editor');
  const step = currentStep >= 0 ? STEPS[currentStep] : null;
  const exSet = executedLines[fileKey] || new Set();

  ed.innerHTML = file.lines.map((l, i) => {
    let cls = 'code-line';
    if(step && step.file === fileKey && step.line === i) cls += ' highlighted';
    else if(exSet.has(i)) cls += ' executed';
    return `<div class="${cls}" id="line-${i}"><span class="ln">${i+1}</span><span class="code">${l[0]}</span></div>`;
  }).join('');

  // Scroll to highlighted
  setTimeout(() => {
    const hl = ed.querySelector('.highlighted');
    if(hl) hl.scrollIntoView({behavior:'smooth', block:'center'});
  }, 50);

  // Update file list active
  document.querySelectorAll('#fileList .file-item').forEach(el => {
    el.classList.toggle('active', el.dataset.file === fileKey);
  });
}

function renderStep() {
  if(currentStep < 0) return;
  const step = STEPS[currentStep];

  // Track executed lines
  if(!executedLines[step.file]) executedLines[step.file] = new Set();
  executedLines[step.file].add(step.line);

  // Phase badge
  if(step.phase) document.getElementById('phaseBadge').textContent = step.phase;

  // Show the file
  showFile(step.file);

  // Explanation
  document.getElementById('explanation').innerHTML = `<span class="emoji">${step.explain.slice(0,2)}</span> ${step.explain.slice(2)}`;

  // Call stack
  document.getElementById('callStack').innerHTML = (step.stack||[]).map(s => `<div class="call-stack-item">${s}</div>`).join('') || '<span style="color:var(--text-dim);font-size:11px">Empty</span>';

  // Variables
  const vars = step.vars || {};
  const vk = Object.keys(vars);
  document.getElementById('variables').innerHTML = vk.length ? vk.map(k => `<div class="var-row"><span class="vname">${k}</span><span class="vval" title="${vars[k]}">${vars[k]}</span></div>`).join('') : '<span style="color:var(--text-dim);font-size:11px">No variables</span>';

  // Events
  const evts = step.events || [];
  document.getElementById('events').innerHTML = evts.length ? evts.map(e => `<div class="var-row"><span class="vval" style="max-width:100%;color:var(--green)">${e}</span></div>`).join('') : '<span style="color:var(--text-dim);font-size:11px">No events</span>';

  // Progress
  const pct = ((currentStep + 1) / STEPS.length * 100).toFixed(0);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('stepCounter').textContent = `${currentStep + 1} / ${STEPS.length}`;

  // Update file states
  const touchedFiles = new Set(STEPS.slice(0, currentStep+1).map(s=>s.file));
  document.querySelectorAll('#fileList .file-item').forEach(el => {
    const f = el.dataset.file;
    el.classList.remove('done','active','pending');
    if(f === step.file) el.classList.add('active');
    else if(touchedFiles.has(f)) el.classList.add('done');
    else el.classList.add('pending');
  });

  // Chapter states
  const currentPhaseIdx = STEPS.findIndex(s => s.phase === (step.phase || document.getElementById('phaseBadge').textContent));
  document.querySelectorAll('#chapterList .file-item').forEach(el => {
    const si = parseInt(el.dataset.step);
    el.classList.remove('done','active','pending');
    if(si === currentPhaseIdx || (step.phase && STEPS[si]?.phase === step.phase)) el.classList.add('active');
    else if(si < currentStep) el.classList.add('done');
    else el.classList.add('pending');
  });

  // Button states
  document.getElementById('btnPrev').disabled = currentStep <= 0;
  document.getElementById('btnNext').disabled = currentStep >= STEPS.length - 1;
}

function nextStep() {
  if(currentStep < STEPS.length - 1) { currentStep++; renderStep(); }
  else if(playing) togglePlay();
}
function prevStep() {
  if(currentStep > 0) { currentStep--; executedLines = {}; for(let i=0;i<=currentStep;i++){const s=STEPS[i];if(!executedLines[s.file])executedLines[s.file]=new Set();executedLines[s.file].add(s.line);} renderStep(); }
}
function goToStep(idx) {
  currentStep = Math.max(0, Math.min(idx, STEPS.length-1));
  executedLines = {};
  for(let i=0;i<=currentStep;i++){const s=STEPS[i];if(!executedLines[s.file])executedLines[s.file]=new Set();executedLines[s.file].add(s.line);}
  renderStep();
}
function reset() { currentStep=-1; executedLines={}; playing=false; clearInterval(playTimer); document.getElementById('btnPlay').textContent='▶ Play'; showFile(fileKeys[0]); document.getElementById('explanation').innerHTML='<span class="emoji">👋</span> Press <b>Next</b> or <b>→</b> to start tracing execution.'; document.getElementById('callStack').innerHTML='<span style="color:var(--text-dim);font-size:11px">Empty</span>'; document.getElementById('variables').innerHTML='<span style="color:var(--text-dim);font-size:11px">No variables yet</span>'; document.getElementById('events').innerHTML='<span style="color:var(--text-dim);font-size:11px">No events fired</span>'; document.getElementById('progressFill').style.width='0%'; document.getElementById('stepCounter').textContent=`0 / ${STEPS.length}`; document.querySelectorAll('#fileList .file-item, #chapterList .file-item').forEach(el=>{el.classList.remove('done','active');el.classList.add('pending')}); document.getElementById('btnPrev').disabled=true; document.getElementById('btnNext').disabled=false; }
function togglePlay() {
  playing = !playing;
  document.getElementById('btnPlay').innerHTML = playing ? '⏸ Pause <span class="kbd">Space</span>' : '▶ Play <span class="kbd">Space</span>';
  if(playing) { playTimer = setInterval(nextStep, parseInt(document.getElementById('speedSelect').value)); }
  else clearInterval(playTimer);
}

initUI();
</script>
